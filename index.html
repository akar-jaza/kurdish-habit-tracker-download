<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Download خووەکانم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #2d6a4f;
      --accent-soft: #d8f3dc;
      --shadow: 0 24px 48px rgba(26, 26, 26, 0.06);
      --radius: 24px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, var(--accent-soft) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(45, 106, 79, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .app-icon-container {
      width: 88px;
      height: 88px;
      margin: 0 auto 28px;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .app-icon {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9375rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 36px;
      direction: ltr;
    }

    .stores {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      direction: ltr;
      width: 100%;
    }

    .store-badge {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 210px;
      height: 56px;
      padding: 0 18px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      direction: ltr;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .store-badge:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    .store-badge:active {
      transform: translateY(0);
    }

    .store-logo {
      position: absolute;
      left: 18px;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .store-logo svg {
      display: block;
    }

    .store-logo--apple svg {
      width: 20px;
      height: 24px;
      fill: #fff;
    }

    .store-logo--play svg {
      width: 24px;
      height: 24px;
    }

    .store-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.15;
      min-height: 28px;
    }

    .store-text-small {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
      white-space: nowrap;
    }

    .store-text-large {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      white-space: nowrap;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--text-muted);
      direction: ltr;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
        align-items: flex-start;
        padding-top: max(16px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }

      .card {
        padding: 36px 24px;
        border-radius: 20px;
        margin: auto 0;
      }

      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.875rem;
        margin-bottom: 28px;
      }

      .app-icon-container {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        margin-bottom: 24px;
      }

      .store-badge {
        max-width: 100%;
        height: 54px;
        padding: 0 16px;
      }

      .store-logo {
        left: 16px;
      }

      .footer {
        margin-top: 24px;
        font-size: 0.7rem;
      }
    }

    @media (max-width: 360px) {
      .card {
        padding: 28px 20px;
      }

      .store-badge {
        height: 52px;
        padding: 0 14px;
      }

      .store-logo {
        left: 14px;
      }

      .store-text-small {
        font-size: 9px;
      }

      .store-text-large {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="app-icon-container">
      <img src="app_icon.png" alt="خووەکانم app icon" width="88" height="88" class="app-icon">
    </div>

    <h1>خووەکانم</h1>
    <p class="subtitle">Kurdish Habit Tracker</p>

    <div class="stores">
      <a class="store-badge" href="https://apps.apple.com/us/app/%D8%AE%D9%88%D9%88%DB%95%DA%A9%D8%A7%D9%86%D9%85/id6774152069" aria-label="Download on the App Store">
        <span class="store-logo store-logo--apple" aria-hidden="true">
          <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-163.5-39.5c-76 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.8 1.9 18.5 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.7z" />
          </svg>
        </span>
        <span class="store-text">
          <span class="store-text-small">Download on the</span>
          <span class="store-text-large">App Store</span>
        </span>
      </a>

      <a class="store-badge" href="https://play.google.com/store/apps/details?id=com.akar.khuwakanm&pcampaignid=web_share" aria-label="Get it on Google Play">
        <span class="store-logo store-logo--play" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 20.5V3.5C3 2.91 3.34 2.39 3.84 2.15L13.69 12L3.84 21.85C3.34 21.6 3 21.09 3 20.5Z"
              fill="#00D2FF" />
            <path d="M16.81 15.12L6.05 21.34L14.54 12.85L16.81 15.12Z" fill="#FF3A44" />
            <path d="M3.84 2.15L13.69 12L3.84 21.85C3.34 21.6 3 21.09 3 20.5V3.5C3 2.91 3.34 2.39 3.84 2.15Z"
              fill="#00F076" />
            <path d="M16.81 8.88L6.05 2.66L14.54 11.15L16.81 8.88Z" fill="#FFB900" />
            <path
              d="M20.16 10.81C20.5 11.08 20.75 11.5 20.75 12C20.75 12.5 20.53 12.9 20.18 13.18L17.89 14.5L15.39 12L17.89 9.5L20.16 10.81Z"
              fill="#FF3A44" />
          </svg>
        </span>
        <span class="store-text">
          <span class="store-text-small">GET IT ON</span>
          <span class="store-text-large">Google Play</span>
        </span>
      </a>
    </div>

    <p class="footer">Track your habits, build better routines.</p>
  </main>
</body>

</html>
